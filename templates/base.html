<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Stock Analyzer Pro{% endblock %}</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-primary: #0a0a0f;
            --bg-secondary: #12121a;
            --bg-tertiary: #1a1a25;
            --accent-cyan: #00d4ff;
            --accent-green: #00ff88;
            --accent-gold: #ffd700;
            --accent-orange: #ff6b35;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666680;
            --border-color: rgba(255, 255, 255, 0.08);
            --card-shadow: 0 4px 24px rgba(0, 0, 0, 0.4);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            min-height: 100vh;
            color: var(--text-primary);
            line-height: 1.6;
        }
        
        .bg-pattern {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at 20% 20%, rgba(0, 212, 255, 0.08) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 80%, rgba(0, 255, 136, 0.05) 0%, transparent 50%),
                linear-gradient(180deg, var(--bg-primary) 0%, var(--bg-secondary) 100%);
            z-index: -1;
        }
        
        .navbar {
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        
        .logo {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            text-decoration: none;
        }
        
        .logo-icon {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.25rem;
        }
        
        .logo span:last-child {
            background: linear-gradient(135deg, var(--accent-cyan), var(--accent-green));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .nav-links {
            display: flex;
            gap: 0.25rem;
        }
        
        .nav-links a {
            color: var(--text-secondary);
            text-decoration: none;
            padding: 0.6rem 1rem;
            border-radius: 8px;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.25s ease;
        }
        
        .nav-links a:hover, .nav-links a.active {
            background: rgba(0, 212, 255, 0.1);
            color: var(--accent-cyan);
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .hero-section {
            padding: 4rem 0;
            text-align: center;
        }
        
        .hero-title {
            font-family: 'Playfair Display', serif;
            font-size: 3.5rem;
            font-weight: 700;
            margin-bottom: 1rem;
            background: linear-gradient(135deg, var(--text-primary) 0%, var(--accent-cyan) 50%, var(--accent-green) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .hero-subtitle {
            font-size: 1.2rem;
            color: var(--text-secondary);
            max-width: 600px;
            margin: 0 auto 2rem;
        }
        
        .search-container {
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }
        
        .search-input {
            width: 100%;
            padding: 1.25rem 1.5rem;
            padding-left: 3.5rem;
            border-radius: 16px;
            border: 2px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 1.1rem;
            transition: all 0.3s ease;
        }
        
        .search-input:focus {
            outline: none;
            border-color: var(--accent-cyan);
            box-shadow: 0 0 30px rgba(0, 212, 255, 0.2);
        }
        
        .search-icon {
            position: absolute;
            left: 1.25rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            font-size: 1.25rem;
        }
        
        .quick-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            justify-content: center;
            margin-top: 1.5rem;
        }
        
        .quick-tag {
            padding: 0.4rem 0.9rem;
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            color: var(--text-secondary);
            font-size: 0.85rem;
            text-decoration: none;
            transition: all 0.25s ease;
        }
        
        .quick-tag:hover {
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent-cyan);
            border-color: var(--accent-cyan);
        }
        
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        
        .section-title::before {
            content: '';
            width: 4px;
            height: 28px;
            background: linear-gradient(180deg, var(--accent-cyan), var(--accent-green));
            border-radius: 2px;
        }
        
        .news-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .news-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        
        .news-card:hover {
            transform: translateY(-4px);
            border-color: rgba(0, 212, 255, 0.3);
            box-shadow: var(--card-shadow);
        }
        
        .news-image {
            width: 100%;
            height: 160px;
            object-fit: cover;
            background: linear-gradient(135deg, var(--bg-tertiary), var(--bg-secondary));
        }
        
        .news-content {
            padding: 1.25rem;
        }
        
        .news-category {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            background: rgba(0, 212, 255, 0.15);
            color: var(--accent-cyan);
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.75rem;
        }
        
        .news-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 0.5rem;
            line-height: 1.4;
        }
        
        .news-title a {
            color: var(--text-primary);
            text-decoration: none;
        }
        
        .news-title a:hover {
            color: var(--accent-cyan);
        }
        
        .news-meta {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .featured-news {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 3rem;
        }
        
        .featured-card {
            position: relative;
            border-radius: 20px;
            overflow: hidden;
            height: 400px;
        }
        
        .featured-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }
        
        .featured-card:hover .featured-image {
            transform: scale(1.05);
        }
        
        .featured-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            padding: 2rem;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.9));
        }
        
        .featured-category {
            display: inline-block;
            padding: 0.35rem 0.85rem;
            background: var(--accent-orange);
            color: white;
            font-size: 0.75rem;
            font-weight: 600;
            border-radius: 4px;
            text-transform: uppercase;
            margin-bottom: 0.75rem;
        }
        
        .featured-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.75rem;
            font-weight: 700;
            margin-bottom: 0.5rem;
        }
        
        .featured-title a {
            color: white;
            text-decoration: none;
        }
        
        .featured-title a:hover {
            text-decoration: underline;
        }
        
        .featured-meta {
            color: rgba(255, 255, 255, 0.7);
            font-size: 0.85rem;
        }
        
        .market-ticker {
            display: flex;
            gap: 2rem;
            padding: 1rem 1.5rem;
            background: var(--bg-secondary);
            border-radius: 12px;
            margin-bottom: 2rem;
            overflow-x: auto;
        }
        
        .ticker-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            white-space: nowrap;
        }
        
        .ticker-symbol {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .ticker-price {
            font-family: 'JetBrains Mono', monospace;
            color: var(--text-secondary);
        }
        
        .ticker-change {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.85rem;
            font-weight: 500;
        }
        
        .ticker-up { color: var(--accent-green); }
        .ticker-down { color: #ff4757; }
        
        .card {
            background: var(--bg-secondary);
            border-radius: 16px;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            border: 1px solid var(--border-color);
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 1.25rem;
            text-align: center;
            border: 1px solid var(--border-color);
            transition: all 0.3s ease;
        }
        
        .stat-card:hover {
            border-color: var(--accent-cyan);
        }
        
        .stat-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent-cyan);
            margin-bottom: 0.25rem;
        }
        
        .stat-label {
            color: var(--text-muted);
            font-size: 0.85rem;
        }
        
        .stock-table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .stock-table th, .stock-table td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .stock-table th {
            color: var(--accent-cyan);
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .stock-table tr:hover {
            background: rgba(0, 212, 255, 0.05);
        }
        
        .stock-symbol {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .stock-name {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }
        
        .stock-sector {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        
        .badge {
            display: inline-block;
            padding: 0.2rem 0.6rem;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-buy { background: rgba(0, 255, 136, 0.15); color: var(--accent-green); }
        .badge-hold { background: rgba(255, 193, 7, 0.15); color: var(--accent-gold); }
        .badge-sell { background: rgba(255, 71, 87, 0.15); color: #ff4757; }
        
        .score {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.25rem;
            font-weight: 700;
        }
        
        .score-high { color: var(--accent-green); }
        .score-medium { color: var(--accent-gold); }
        .score-low { color: #ff4757; }
        
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            padding: 0.75rem 1.5rem;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            font-size: 0.95rem;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, var(--accent-cyan), #0099cc);
            color: var(--bg-primary);
        }
        
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0, 212, 255, 0.4);
        }
        
        .btn-secondary {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            border: 1px solid var(--border-color);
        }
        
        .btn-secondary:hover {
            background: rgba(0, 212, 255, 0.1);
            border-color: var(--accent-cyan);
        }
        
        .etf-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
        }
        
        .etf-card {
            background: var(--bg-tertiary);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 1.25rem;
            transition: all 0.3s ease;
            cursor: pointer;
            text-decoration: none;
            display: block;
        }
        
        .etf-card:hover {
            border-color: var(--accent-cyan);
            transform: translateY(-3px);
            box-shadow: var(--card-shadow);
        }
        
        .etf-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.75rem;
        }
        
        .etf-symbol {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 1.1rem;
            color: var(--accent-cyan);
        }
        
        .etf-type {
            font-size: 0.7rem;
            padding: 0.2rem 0.5rem;
            background: rgba(255, 215, 0, 0.15);
            color: var(--accent-gold);
            border-radius: 4px;
            text-transform: uppercase;
        }
        
        .etf-name {
            color: var(--text-secondary);
            font-size: 0.9rem;
            margin-bottom: 0.5rem;
        }
        
        .etf-category {
            display: inline-block;
            font-size: 0.75rem;
            color: var(--text-muted);
            padding: 0.2rem 0.5rem;
            background: var(--bg-secondary);
            border-radius: 4px;
        }
        
        .indicator-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1rem;
        }
        
        .indicator-card {
            background: var(--bg-tertiary);
            border-radius: 12px;
            padding: 1.25rem;
            border: 1px solid var(--border-color);
        }
        
        .indicator-label {
            color: var(--text-muted);
            font-size: 0.85rem;
            margin-bottom: 0.5rem;
        }
        
        .indicator-value {
            font-family: 'JetBrains Mono', monospace;
            font-size: 1.5rem;
            font-weight: 600;
            color: var(--text-primary);
        }
        
        .indicator-interpretation {
            font-size: 0.8rem;
            margin-top: 0.5rem;
        }
        
        .good { color: var(--accent-green); }
        .warning { color: var(--accent-gold); }
        .bad { color: #ff4757; }
        
        footer {
            text-align: center;
            padding: 2rem;
            color: var(--text-muted);
            margin-top: 3rem;
            border-top: 1px solid var(--border-color);
        }
        
        @media (max-width: 768px) {
            .navbar {
                flex-direction: column;
                gap: 1rem;
                padding: 1rem;
            }
            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
            }
            .hero-title {
                font-size: 2.5rem;
            }
            .featured-news {
                grid-template-columns: 1fr;
            }
            .featured-card {
                height: 300px;
            }
            .featured-title {
                font-size: 1.4rem;
            }
            .market-ticker {
                padding: 0.75rem 1rem;
                gap: 1rem;
            }
        }
    </style>
</head>
<body>
    <div class="bg-pattern"></div>
    
    <nav class="navbar">
        <a href="/" class="logo">
            <div class="logo-icon">📈</div>
            <span>Stock Analyzer</span>
        </a>
        <div class="nav-links">
            <a href="/" class="{% if request.path == '/' %}active{% endif %}">Accueil</a>
            <a href="/analyze" class="{% if request.path == '/analyze' %}active{% endif %}">Analyser</a>
            <a href="/etf" class="{% if request.path == '/etf' %}active{% endif %}">ETF</a>
            <a href="/compare" class="{% if request.path == '/compare' %}active{% endif %}">Comparer</a>
            <a href="/library" class="{% if request.path == '/library' %}active{% endif %}">Bibliothèque</a>
        </div>
    </nav>
    
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    
    <footer>
        <p>Stock Analyzer Pro - Analyse financière professionnelle</p>
    </footer>
</body>
</html>
